<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Gabriel - v0.32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --text: #333; --qtd-bg: #fff9e6;
            --primary: #007bff; --secondary: #6c757d; --success: #28a745;
            --info: #17a2b8; --warning: #ff9800; --danger: #dc3545; --purple: #6f42c1;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 98vh; }
        .container { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 100%; max-width: 500px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .version-footer { font-size: 10px; color: #bbb; text-align: center; margin-top: 20px; width: 100%; }
        
        input[type="text"], input[type="password"], input[type="number"] { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; 
        }
        
        /* CORREÇÃO DO ALINHAMENTO DO CHECKBOX */
        .login-options { 
            display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; width: 100%; 
        }
        .login-options input[type="checkbox"] { width: 20px; height: 20px; margin: 0; cursor: pointer; }
        .login-options label { font-size: 14px; cursor: pointer; user-select: none; }

        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; padding: 14px; width: 100%; margin-top: 10px; font-size: 14px; color: white; text-transform: uppercase; }
        .btn-blue { background: var(--primary); }
        .btn-purple { background: var(--purple); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--warning); }
        .btn-cyan { background: var(--info); }
        .btn-gray { background: var(--secondary); }
        .btn-red { background: var(--danger); }
        
        .soma-control { display: flex; align-items: center; justify-content: center; gap: 10px; background: #e9ecef; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .add-box { background: #f8f9fa; border: 2px dashed var(--purple); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 10px 8px; text-align: left; font-size: 12px; color: #212529; }
        th { background: #f1f3f5; }
        .qtd-editavel { cursor: pointer; background: var(--qtd-bg); font-weight: bold; text-align: center; font-size: 16px; color: #000; border: 2px solid #ffeeba; }

        #photoOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #photoOverlay img { max-width: 100%; max-height: 70%; border-radius: 8px; box-shadow: 0 0 20px #fff; margin-bottom: 20px; }
        .overlay-buttons { display: flex; gap: 10px; width: 100%; max-width: 400px; }
    </style>
</head>
<body onload="carregarTudo()">

<div id="photoOverlay" class="hidden">
    <p style="color:white; text-align:center;">FOTO GERADA!</p>
    <img id="resultImage" src="">
    <div class="overlay-buttons">
        <button class="btn-green" onclick="baixarFoto()">💾 SALVAR</button>
        <button class="btn-red" onclick="fecharFoto()">FECHAR</button>
    </div>
</div>

<div class="container">
    <div id="loginSection">
        <h2 style="text-align: center;">Acesso Painel</h2>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <div class="login-options">
            <input type="checkbox" id="lembrar"> 
            <label for="lembrar">Lembrar meu acesso</label>
        </div>
        <button class="btn-blue" onclick="acessar()">Entrar</button>
    </div>

    <div id="menuSection" class="hidden">
        <h2>Menu Principal</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-blue" onclick="abrirSetor('Inventário')">Inventário</button>
            <button class="btn-blue" onclick="abrirSetor('Triados')">Triados</button>
            <button class="btn-blue" style="grid-column: span 2;" onclick="abrirSetor('Quantidade Pedido')">Qtd Pedido</button>
        </div>
        <button class="btn-gray" onclick="logout()">Sair</button>
    </div>

    <div id="planilhaSection" class="hidden">
        <div class="soma-control">
            <span>MODO SOMA:</span>
            <input type="checkbox" id="somaSwitch" style="width: 25px; height: 25px;">
        </div>

        <div class="add-box">
            <h4 style="margin:0 0 10px 0; text-align:center; color:var(--purple)">➕ NOVO ITEM</h4>
            <input type="text" id="novoCod" placeholder="Código">
            <input type="text" id="novoItem" placeholder="Nome do Produto">
            <input type="number" id="novoPreco" placeholder="Preço (Ex: 22.50)">
            <button class="btn-purple" onclick="adicionarItemNovo()">CADASTRAR ITEM</button>
        </div>

        <div id="areaCapture" style="background: white; padding: 15px; border-radius: 5px;">
            <h3 id="tituloSetor" style="color: black; margin-bottom: 10px; text-align: center;"></h3>
            <table>
                <thead><tr><th>Cód</th><th>Item</th><th>Qtd</th><th>Preço</th></tr></thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <button class="btn-green" onclick="salvarAgoraManual()">💾 SALVAR DADOS</button>
        <button class="btn-orange" onclick="zerarQuantidades()">🔄 ZERAR TUDO</button>
        <button class="btn-cyan" onclick="gerarFoto()">📸 GERAR FOTO</button>
        <button class="btn-green" style="background: #25d366;" onclick="enviarWhatsApp()">📲 WHATSAPP</button>
        <button class="btn-gray" onclick="voltar()">⬅ VOLTAR</button>
    </div>
</div>

<div class="version-footer">versão 0.32</div>

<script>
    let memoria = {
        'Inventário': [
            { cod: "20007367", item: "Pallet 348", qtd: 0, preco: "0.00" },
            { cod: "2011431", item: "Pallet Godzilla", qtd: 0, preco: "0.00" }
        ],
        'Triados': [], 'Quantidade Pedido': []
    };

    function carregarTudo() {
        // Carrega dados da planilha
        const dados = localStorage.getItem('GABRIEL_DATA_V32');
        if (dados) memoria = JSON.parse(dados);
        
        // Carrega Login
        const login = localStorage.getItem('GABRIEL_LOGIN_V32');
        if (login) {
            const l = JSON.parse(login);
            document.getElementById('usuario').value = l.u || "";
            document.getElementById('senha').value = l.s || "";
            document.getElementById('lembrar').checked = true;
        }
    }

    function acessar() {
        const u = document.getElementById('usuario').value.trim();
        const s = document.getElementById('senha').value.trim();
        const checkbox = document.getElementById('lembrar').checked;

        if (u === "Gabriel" && s === "12345") {
            if (checkbox) {
                localStorage.setItem('GABRIEL_LOGIN_V32', JSON.stringify({u, s}));
            } else {
                localStorage.removeItem('GABRIEL_LOGIN_V32');
            }
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('menuSection').classList.remove('hidden');
        } else { alert("Acesso Negado!"); }
    }

    function abrirSetor(nome) {
        window.setorAtivo = nome;
        document.getElementById('tituloSetor').innerText = nome;
        document.getElementById('menuSection').classList.add('hidden');
        document.getElementById('planilhaSection').classList.remove('hidden');
        renderizar();
    }

    function renderizar() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        memoria[window.setorAtivo].forEach((obj, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${obj.cod}</td><td>${obj.item}</td><td class="qtd-editavel" onclick="editar(${i})">${obj.qtd}</td><td>R$ ${obj.preco}</td>`;
            corpo.appendChild(tr);
        });
        localStorage.setItem('GABRIEL_DATA_V32', JSON.stringify(memoria));
    }

    function adicionarItemNovo() {
        const cod = document.getElementById('novoCod').value.trim();
        const item = document.getElementById('novoItem').value.trim();
        const preco = document.getElementById('novoPreco').value.trim() || "0.00";
        if (!cod || !item) { alert("Preencha Cód e Nome!"); return; }
        memoria[window.setorAtivo].push({ cod, item, qtd: 0, preco });
        document.getElementById('novoCod').value = ""; document.getElementById('novoItem').value = ""; document.getElementById('novoPreco').value = "";
        renderizar();
    }

    function editar(i) {
        const modoSoma = document.getElementById('somaSwitch').checked;
        const valorAtual = memoria[window.setorAtivo][i].qtd;
        const entrada = prompt(modoSoma ? "Somar quanto?" : "Nova quantidade:", modoSoma ? "" : valorAtual);
        if (entrada !== null && entrada !== "") {
            const num = parseInt(entrada) || 0;
            memoria[window.setorAtivo][i].qtd = modoSoma ? (valorAtual + num) : num;
            renderizar();
        }
    }

    function zerarQuantidades() {
        if(confirm("Zerar tudo?")) {
            memoria[window.setorAtivo].forEach(item => item.qtd = 0);
            renderizar();
        }
    }

    function salvarAgoraManual() {
        localStorage.setItem('GABRIEL_DATA_V32', JSON.stringify(memoria));
        alert("✅ Salvo com sucesso!");
    }

    function gerarFoto() {
        const area = document.getElementById('areaCapture');
        html2canvas(area, { backgroundColor: "#ffffff", scale: 3 }).then(canvas => {
            document.getElementById('resultImage').src = canvas.toDataURL("image/png");
            document.getElementById('photoOverlay').classList.remove('hidden');
        });
    }

    function baixarFoto() {
        const link = document.createElement('a');
        link.download = `Relatorio_${window.setorAtivo}.png`;
        link.href = document.getElementById('resultImage').src;
        link.click();
        alert("Download solicitado.");
    }

    function fecharFoto() { document.getElementById('photoOverlay').classList.add('hidden'); }

    function enviarWhatsApp() {
        let msg = `*Relatório de Produtos - Gabriel*\n\n`;
        memoria[window.setorAtivo].forEach(i => {
            if(i.qtd > 0) {
                msg += `📦 *Cód:* ${i.cod}\n🔹 *Produto:* ${i.item}\n🔢 *Qtd:* ${i.qtd}\n💰 *Preço:* ${i.preco}\n--------------------------\n`;
            }
        });
        window.open("https://wa.me/?text=" + encodeURIComponent(msg), '_blank');
    }

    function voltar() {
        document.getElementById('planilhaSection').classList.add('hidden');
        document.getElementById('menuSection').classList.remove('hidden');
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
