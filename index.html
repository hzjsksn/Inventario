<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Koda Store - v3.0</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --primary: #007bff; --success: #28a745; --purple: #6f42c1; --danger: #dc3545; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        .hidden { display: none !important; }
        input { width: 100%; height: 45px; margin: 5px 0; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { border: none; border-radius: 8px; padding: 12px; width: 100%; margin-top: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-blue { background: var(--primary); }
        .btn-purple { background: var(--purple); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f9fa; }
        .setor-badge { background: #6f42c1; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h2 style="text-align:center">Koda Store</h2>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-blue" onclick="acessar()">Entrar</button>
    </div>

    <div id="menuSection" class="hidden">
        <h3 style="text-align:center">Painel de Controle</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-purple" onclick="abrirSetor('Inventário')">Inventário</button>
            <button class="btn-purple" onclick="abrirSetor('Triados')">Triados</button>
            <button class="btn-purple" onclick="abrirSetor('Pregação')">Pregação</button>
            <button class="btn-purple" onclick="abrirSetor('Não Triado')">Não Triado</button>
        </div>
        <button class="btn-red" style="margin-top:20px" onclick="location.reload()">Sair</button>
    </div>

    <div id="planilhaSection" class="hidden">
        <div class="setor-badge" id="nomeSetorAtivo"></div>
        <div id="formulario">
            <input type="text" id="cod" placeholder="Cód">
            <input type="text" id="item" placeholder="Nome do Produto">
            <input type="number" id="qtd" placeholder="Qtd">
            <input type="text" id="preco" placeholder="R$ 0,00">
            <button class="btn-blue" onclick="adicionar()">Cadastrar Item</button>
        </div>

        <table>
            <thead><tr><th>Cód</th><th>Item</th><th>Qtd</th><th>Preço</th><th>X</th></tr></thead>
            <tbody id="corpoTabela"></tbody>
        </table>

        <button class="btn-green" style="margin-top:20px" onclick="salvarNoFirebase()">💾 SALVAR NO FIREBASE</button>
        <button class="btn-red" onclick="voltar()">Voltar ao Menu</button>
    </div>
</div>

<script>
    const CHAVE = 'GABRIEL_DATA_V53';
    const USER_MASTER = "37096901";
    const PASS_MASTER = "9996057";

    // Estrutura completa com todos os setores
    let bancoDados = {
        'Inventário': [],
        'Triados': [],
        'Pregação': [],
        'Não Triado': []
    };

    let setorAtual = "";

    window.onload = function() {
        const salvos = localStorage.getItem(CHAVE);
        if (salvos) bancoDados = JSON.parse(salvos);
    };

    function acessar() {
        const u = document.getElementById('usuario').value;
        const s = document.getElementById('senha').value;
        if (u === USER_MASTER && s === PASS_MASTER) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('menuSection').classList.remove('hidden');
        } else {
            alert("Acesso negado!");
        }
    }

    function abrirSetor(nome) {
        setorAtual = nome;
        document.getElementById('nomeSetorAtivo').innerText = "SETOR: " + nome;
        document.getElementById('menuSection').classList.add('hidden');
        document.getElementById('planilhaSection').classList.remove('hidden');
        renderizar();
    }

    function voltar() {
        document.getElementById('planilhaSection').classList.add('hidden');
        document.getElementById('menuSection').classList.remove('hidden');
    }

    function adicionar() {
        const c = document.getElementById('cod').value;
        const i = document.getElementById('item').value;
        const q = document.getElementById('qtd').value;
        const p = document.getElementById('preco').value;

        if (!c || !i) return alert("Preencha Cód e Item!");

        bancoDados[setorAtual].push({ cod: c, item: i, qtd: q, preco: p });
        renderizar();
        limparCampos();
    }

    function remover(index) {
        bancoDados[setorAtual].splice(index, 1);
        renderizar();
    }

    function renderizar() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        bancoDados[setorAtual].forEach((obj, idx) => {
            corpo.innerHTML += `<tr>
                <td>${obj.cod}</td>
                <td>${obj.item}</td>
                <td>${obj.qtd}</td>
                <td>${obj.preco}</td>
                <td><button onclick="remover(${idx})" style="background:red; padding:5px; width:auto;">X</button></td>
            </tr>`;
        });
    }

    function limparCampos() {
        document.getElementById('cod').value = "";
        document.getElementById('item').value = "";
        document.getElementById('qtd').value = "";
        document.getElementById('preco').value = "";
    }

    // FUNÇÃO PARA O FIREBASE
    function salvarNoFirebase() {
        const dadosTexto = JSON.stringify(bancoDados);
        localStorage.setItem(CHAVE, dadosTexto);

        if (window.AppInventor) {
            // "Grita" para o Kodular ouvir
            window.AppInventor.setWebViewString("SALVAR:" + dadosTexto);
            alert("🚀 Enviando tudo para o Firebase...");
        } else {
            alert("✅ Salvo localmente!");
        }
    }
</script>
</body>
</html>
