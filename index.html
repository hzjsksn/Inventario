<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel - v4.10</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --qtd-bg: #fff9e6; --primary: #007bff; --secondary: #6c757d; --success: #28a745; --warning: #ff9800; --danger: #dc3545; --purple: #6f42c1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 98vh; box-sizing: border-box; }
        .container { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 100%; max-width: 650px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .version-footer { font-size: 10px; color: #bbb; text-align: center; margin-top: 20px; width: 100%; }
        
        .input-row { display: flex; width: 100%; margin: 8px 0; background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; height: 50px; align-items: center; }
        .input-row input { flex: 1; border: none; padding: 0 12px; font-size: 16px; outline: none; background: transparent; height: 100%; }
        .eye-area { width: 55px; height: 100%; background: #f8f9fa; border-left: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .input-single { width: 100%; height: 50px; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; padding: 14px; width: 100%; margin-top: 10px; font-size: 14px; color: white; text-transform: uppercase; }
        .btn-blue { background: var(--primary); } .btn-purple { background: var(--purple); } .btn-green { background: var(--success); } .btn-gray { background: var(--secondary); } .btn-orange { background: var(--warning); }
        .btn-red { background: var(--danger); }

        table { width: 100%; border-collapse: collapse; margin-top: 5px; background: white; margin-bottom: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 8px 4px; text-align: left; font-size: 11px; }
        .qtd-editavel { cursor: pointer; background: var(--qtd-bg); text-align: center; font-weight: bold; color: var(--purple); font-size: 14px; min-width: 45px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 7000; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 30px; padding: 12px 24px; position: fixed; z-index: 8000; left: 50%; bottom: 50px; transform: translateX(-50%); font-size: 14px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        #printTempArea { background: white; padding: 20px; width: 450px; position: absolute; left: -9999px; }
        .print-header { background: #000; color: white; padding: 8px; text-align: center; font-weight: bold; margin-top: 10px; font-size: 14px; }
        select { padding: 5px; border-radius: 5px; border: 1px solid #ddd; width: 100%; }
    </style>
</head>
<body onload="carregarTudo()">

<div id="toast">Aviso</div>
<div id="printTempArea"></div>

<div id="modalConfirm" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 style="margin:0; color:var(--danger);">Excluir Item?</h3>
        <button type="button" class="btn-red" id="confirmBtnYes">EXCLUIR</button>
        <button type="button" class="btn-gray" onclick="fecharModal('modalConfirm')">CANCELAR</button>
    </div>
</div>

<div id="modalZerar" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Zerar Setor?</h3>
        <button type="button" class="btn-orange" onclick="confirmarZerar()">ZERAR</button>
        <button type="button" class="btn-gray" onclick="fecharModal('modalZerar')">VOLTAR</button>
    </div>
</div>

<div id="modalCalc" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="calcTitulo" style="color:var(--purple); margin:0;">Editar</h3>
        <p id="calcSubtitulo" style="font-size:13px; font-weight:bold; margin: 10px 0;">Qtd atual: 0</p>
        <input type="tel" id="calcInput" class="input-single" style="text-align:center; font-size:26px;" placeholder="0">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px;">
            <button type="button" class="btn-orange" onclick="operacaoCalc('+')">+</button>
            <button type="button" class="btn-orange" onclick="operacaoCalc('-')">-</button>
            <button type="button" class="btn-orange" onclick="operacaoCalc('*')">×</button>
            <button type="button" class="btn-orange" onclick="operacaoCalc('/')">÷</button>
        </div>
        <button type="button" class="btn-purple" onclick="executarCalc()">EDITAR VALOR</button>
        <button type="button" class="btn-gray" onclick="fecharModal('modalCalc')">VOLTAR</button>
    </div>
</div>

<div id="photoOverlay" class="modal-overlay hidden" style="flex-direction:column;">
    <div style="background:white; padding:5px; border-radius:8px;">
        <img id="resultImage" style="max-width:90vw; max-height:75vh;">
    </div>
    <button type="button" class="btn-gray" style="width:200px; margin-top:15px;" onclick="fecharFoto()">FECHAR</button>
</div>

<div class="container">
    <div id="loginSection">
        <h2 style="text-align: center;">Acesso v4.10</h2>
        <input type="text" id="usuario" class="input-single" placeholder="Usuário">
        <div class="input-row">
            <input type="password" id="senha" placeholder="Senha">
            <div class="eye-area" onclick="alternarVisibilidade('senha')">👁️</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
            <input type="checkbox" id="lembrar" style="width:18px; height:18px;"> <label style="font-size:14px;">Lembrar</label>
        </div>
        <button type="button" class="btn-blue" onclick="acessar()">Entrar</button>
        <span style="color:var(--primary); cursor:pointer; text-decoration:underline; font-size:13px; text-align:center; display:block; margin-top:15px;" onclick="alternarLoginRegistro(true)">Solicitar Registro</span>
    </div>

    <div id="registroSection" class="hidden">
        <h2 style="text-align: center;">Registro</h2>
        <input type="text" id="regUsuario" class="input-single" placeholder="Usuário">
        <div class="input-row">
            <input type="password" id="regSenha" placeholder="Senha">
            <div class="eye-area" onclick="alternarVisibilidade('regSenha')">👁️</div>
        </div>
        <button type="button" class="btn-purple" onclick="registrarNovoUsuario()">Enviar Solicitação</button>
        <button type="button" class="btn-gray" onclick="alternarLoginRegistro(false)">Voltar</button>
    </div>

    <div id="menuSection" class="hidden">
        <h2 style="text-align: center;">Menu Principal</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button type="button" class="btn-blue" onclick="abrirSetor('Inventário')">Inventário</button>
            <button type="button" class="btn-blue" onclick="abrirSetor('Triados')">Triados</button>
            <button type="button" class="btn-blue" onclick="abrirSetor('Pregação')">Pregação</button>
            <button type="button" class="btn-blue" onclick="abrirSetor('Não Triado')">Não Triado</button>
            <button type="button" id="btnMembros" class="btn-purple hidden" style="grid-column: span 2;" onclick="abrirMembros()">Gestão de Acessos</button>
        </div>
        <button type="button" class="btn-gray" onclick="logout()">Sair</button>
    </div>

    <div id="membrosSection" class="hidden">
        <h2 style="text-align: center;">Gerenciar Logins</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Usuário</th><th>Senha</th><th>Cargo</th><th>Status/Ação</th></tr></thead>
                <tbody id="corpoMembros"></tbody>
            </table>
        </div>
        <button type="button" class="btn-gray" onclick="voltarAoMenu()">VOLTAR AO MENU</button>
    </div>

    <div id="planilhaSection" class="hidden">
        <div id="areaCadastro">
            <h4 style="margin:0 0 10px 0; text-align:center; color:var(--purple)">SETOR: <span id="labelSetor"></span></h4>
            <input type="tel" id="novoCod" class="input-single" placeholder="Cód">
            <input type="text" id="novoItem" class="input-single" placeholder="Produto">
            <input type="tel" id="novoPreco" class="input-single" placeholder="R$ 0,00" oninput="maskMoeda(this)">
            <input type="tel" id="novoQtd" class="input-single" placeholder="Qtd">
            <button type="button" class="btn-purple" onclick="adicionarItemNovo()">Cadastrar</button>
        </div>
        
        <div id="areaCaptureIndividual">
            <div id="tabelasSetores"></div>
        </div>
        
        <button type="button" id="btnSalvar" class="btn-green" onclick="salvarAgoraManual()">💾 SALVAR NO BANCO</button>
        <button type="button" id="btnPrintMain" class="btn-blue" style="background:#17a2b8" onclick="gerarRelatorio()">📸 GERAR PRINT</button>
        <button type="button" class="btn-green" style="background:#25d366;" onclick="enviarWhatsAppCustom()">📲 ENVIAR WHATSAPP</button>
        <button type="button" id="btnZerar" class="btn-orange hidden" onclick="abrirModal('modalZerar')">🔄 ZERAR SETOR</button>
        <button type="button" class="btn-gray" onclick="voltar()">VOLTAR AO MENU</button>
    </div>
</div>

<div class="version-footer">v4.10 - Hierarquia Supervisor</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-E1mcTPCFoWQlj8wARDWvE-nJ3JeXJXM",
      authDomain: "plhanilha-2e0c3.firebaseapp.com",
      databaseURL: "https://plhanilha-2e0c3-default-rtdb.firebaseio.com",
      projectId: "plhanilha-2e0c3",
      storageBucket: "plhanilha-2e0c3.firebasestorage.app",
      messagingSenderId: "423764140356",
      appId: "1:423764140356:web:8ac99085cfff4612acb711",
      measurementId: "G-RGZ409J25V"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const CHAVE = "APP_GAB_V410"; // Atualizado para nova chave de controle
    const SUPREMO_U = "37096901"; const SUPREMO_P = "9996057";
    
    let memoria = { 'Inventário': [], 'Triados': [], 'Pregação': [], 'Não Triado': [] };
    let membros = []; 
    let cargoUsuario = ""; 
    let itemEditandoIndex = null;

    function maskMoeda(i) { let v = i.value.replace(/\D/g, ""); v = (v/100).toFixed(2).replace(".",","); i.value = "R$ " + v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1."); }
    function alternarVisibilidade(id) { const i = document.getElementById(id); i.type = i.type === "password" ? "text" : "password"; }
    function abrirModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function fecharModal(id) { document.getElementById(id).classList.add('hidden'); }

    function carregarTudo() { 
        const l = localStorage.getItem(CHAVE + '_LOG'); 
        if(l) { 
            const o = JSON.parse(l); 
            document.getElementById('usuario').value = o.u; 
            document.getElementById('senha').value = o.s; 
            document.getElementById('lembrar').checked = true; 
        }
        
        db.ref('memoria').on('value', (s) => { if(s.exists()){ memoria = s.val(); if(!document.getElementById('planilhaSection').classList.contains('hidden')) render(); } });
        db.ref('membros').on('value', (s) => { membros = s.val() || []; if(!document.getElementById('membrosSection').classList.contains('hidden')) renderMembros(); });
    }

    function saveD() { db.ref('memoria').set(memoria).then(() => render()); }
    function mostrarToast(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }

    function acessar() {
        const u = document.getElementById('usuario').value.trim(), s = document.getElementById('senha').value.trim();
        if(u === SUPREMO_U && s === SUPREMO_P) { 
            cargoUsuario = "Supervisor"; 
            document.getElementById('btnMembros').classList.remove('hidden'); 
            return finalizarLogin(u,s); 
        }
        let m = membros.find(x => x.user === u && x.pass === s);
        if(!m) return mostrarToast("Usuário não encontrado!");
        if(!m.aprovado) return mostrarToast("Aguarde aprovação!");
        
        cargoUsuario = m.cargo;
        if(cargoUsuario === "Supervisor") document.getElementById('btnMembros').classList.remove('hidden');
        finalizarLogin(u,s);
    }

    function finalizarLogin(u,s) { 
        // Lógica CORRIGIDA do Lembrar Senha
        if(document.getElementById('lembrar').checked) {
            localStorage.setItem(CHAVE + '_LOG', JSON.stringify({u,s})); 
        } else {
            localStorage.removeItem(CHAVE + '_LOG');
        }
        
        document.getElementById('loginSection').classList.add('hidden'); 
        document.getElementById('menuSection').classList.remove('hidden'); 
    }

    function abrirSetor(n) { 
        window.setorAtivo = n; document.getElementById('labelSetor').innerText = n;
        const ehSupervisor = (cargoUsuario === "Supervisor");
        const ehAuxiliar = (cargoUsuario === "Auxiliar");

        document.getElementById('areaCadastro').classList.toggle('hidden', ehAuxiliar);
        document.getElementById('btnSalvar').classList.toggle('hidden', ehAuxiliar);
        document.getElementById('btnZerar').classList.toggle('hidden', !ehSupervisor);
        
        const btnPrint = document.getElementById('btnPrintMain');
        btnPrint.innerText = (n === 'Inventário') ? "📸 PRINT INVENTÁRIO" : "📸 PRINT RELATÓRIO";
        btnPrint.style.background = (n === 'Inventário') ? "#17a2b8" : "#6f42c1";

        document.getElementById('menuSection').classList.add('hidden'); document.getElementById('planilhaSection').classList.remove('hidden'); render();
    }

    function render() {
        const container = document.getElementById('tabelasSetores');
        container.innerHTML = `<div style="background:#444; color:white; padding:8px; font-weight:bold; text-align:center; border-radius:5px; margin-top:10px;">${window.setorAtivo.toUpperCase()}</div>`;
        let html = `<table><thead><tr><th>Cód</th><th>Item</th><th>Qtd</th><th>Preço</th>`;
        if(cargoUsuario !== "Auxiliar") html += `<th>X</th>`;
        html += `</tr></thead><tbody>`;
        (memoria[window.setorAtivo] || []).forEach((o, i) => {
            html += `<tr><td>${o.cod}</td><td>${o.item}</td>`;
            if(cargoUsuario !== "Auxiliar") html += `<td class="qtd-editavel" onclick="prepararCalc(${i})">${o.qtd}</td>`;
            else html += `<td>${o.qtd}</td>`;
            html += `<td>${o.preco}</td>`;
            if(cargoUsuario !== "Auxiliar") html += `<td style="text-align:center"><button type="button" style="background:red; padding:4px 8px; width:auto; margin:0; border:none; border-radius:8px; color:white;" onclick="confirmarRemover(${i})">❌</button></td>`;
            html += `</tr>`;
        });
        container.innerHTML += html + `</tbody></table>`;
    }

    function confirmarRemover(i) {
        if(cargoUsuario === "Auxiliar") return;
        abrirModal('modalConfirm');
        document.getElementById('confirmBtnYes').onclick = function() {
            memoria[window.setorAtivo].splice(i, 1); saveD(); fecharModal('modalConfirm');
        };
    }

    function prepararCalc(i) { 
        if(cargoUsuario === "Auxiliar") return;
        itemEditandoIndex = i; const item = memoria[window.setorAtivo][i]; 
        document.getElementById('calcTitulo').innerText = item.item; 
        document.getElementById('calcSubtitulo').innerText = "Qtd atual: " + item.qtd;
        document.getElementById('calcInput').value = ""; abrirModal('modalCalc'); 
    }

    function operacaoCalc(op) {
        const valTxt = document.getElementById('calcInput').value.trim();
        if(valTxt === "") return mostrarToast("Digite valor!");
        let val = parseInt(valTxt) || 0, atual = parseInt(memoria[window.setorAtivo][itemEditandoIndex].qtd) || 0;
        if(op==='+') atual += val; else if(op==='-') atual -= val; else if(op==='*') atual *= val; else if(op==='/') atual = val!==0?Math.round(atual/val):0;
        memoria[window.setorAtivo][itemEditandoIndex].qtd = atual; saveD();
        document.getElementById('calcSubtitulo').innerText = "Qtd atual: " + atual;
        document.getElementById('calcInput').value = "";
    }

    function executarCalc() {
        const valTxt = document.getElementById('calcInput').value.trim();
        if(valTxt === "") return mostrarToast("Digite valor!");
        memoria[window.setorAtivo][itemEditandoIndex].qtd = parseInt(valTxt) || 0; 
        saveD(); fecharModal('modalCalc');
    }

    function adicionarItemNovo() {
        if(cargoUsuario === "Auxiliar") return;
        const c = document.getElementById('novoCod').value, it = document.getElementById('novoItem').value, p = document.getElementById('novoPreco').value || "R$ 0,00", q = document.getElementById('novoQtd').value || "0";
        if(!c || !it) return;
        if(!memoria[window.setorAtivo]) memoria[window.setorAtivo] = [];
        memoria[window.setorAtivo].push({ cod: c, item: it, qtd: q, preco: p });
        saveD(); document.getElementById('novoCod').value = ""; document.getElementById('novoItem').value = ""; document.getElementById('novoPreco').value = ""; document.getElementById('novoQtd').value = "";
    }

    function gerarRelatorio() { if(window.setorAtivo === 'Inventário') tirarFotoIndividual(); else tirarFotoGrupo(); }

    function tirarFotoIndividual() {
        html2canvas(document.getElementById('areaCaptureIndividual'), { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
            document.getElementById('resultImage').src = canvas.toDataURL(); abrirModal('photoOverlay');
        });
    }

    function tirarFotoGrupo() { 
        const tmp = document.getElementById('printTempArea');
        tmp.innerHTML = `<h2 style="text-align:center;">ESTOQUE ATUAL</h2>`;
        let tem = false;
        ['Triados', 'Não Triado', 'Pregação'].forEach(s => {
            const itens = (memoria[s] || []).filter(x => parseInt(x.qtd) > 0);
            if(itens.length > 0) {
                tem = true; tmp.innerHTML += `<div class="print-header">${s.toUpperCase()}</div>`;
                let table = `<table><thead><tr><th>Cód</th><th>Item</th><th>Qtd</th><th>Preço</th></tr></thead><tbody>`;
                itens.forEach(i => { table += `<tr><td>${i.cod}</td><td>${i.item}</td><td>${i.qtd}</td><td>${i.preco}</td></tr>`; });
                tmp.innerHTML += table + `</tbody></table>`;
            }
        });
        if(!tem) return mostrarToast("Vazio!");
        setTimeout(() => {
            html2canvas(tmp, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
                document.getElementById('resultImage').src = canvas.toDataURL(); abrirModal('photoOverlay'); tmp.innerHTML = "";
            });
        }, 400);
    }

    function enviarWhatsAppCustom() {
        let txt = "📊 *RELATÓRIO DE ITENS DISPONÍVEIS* 📊\n\n✅ *DADOS DO SISTEMA:*\n"; 
        let tem = false;
        const setores = (window.setorAtivo === 'Inventário') ? ['Inventário'] : ['Triados', 'Não Triado', 'Pregação'];
        setores.forEach(s => {
            const itens = (memoria[s] || []).filter(x => parseInt(x.qtd) > 0);
            if(itens.length > 0) {
                tem = true; txt += `\n📍 *SETOR: ${s.toUpperCase()}*\n------------------------------------\n`; 
                itens.forEach(i => {
                    txt += `🆔 *ID/CÓDIGO:* ${i.cod}\n📦 *ITEM:* ${i.item}\n🔢 *QUANTIDADE:* ${i.qtd}\n💰 *VALOR:* ${i.preco}\n------------------------------------\n`;
                }); 
            } 
        });
        if(tem) { txt += `\n_Gerado via sistema_ 📱`; window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank'); }
        else mostrarToast("Vazio!");
    }

    function confirmarZerar() { if(cargoUsuario === "Supervisor") { memoria[window.setorAtivo].forEach(i => i.qtd = 0); saveD(); fecharModal('modalZerar'); } }
    
    // LOGOUT CORRIGIDO PARA NÃO DELETAR A MEMÓRIA (A MENOS QUE A CAIXA ESTEJA DESMARCADA) E NÃO RECARREGAR A PÁGINA
    function logout() { 
        const l = localStorage.getItem(CHAVE + '_LOG');
        if(l) {
            const o = JSON.parse(l);
            document.getElementById('usuario').value = o.u;
            document.getElementById('senha').value = o.s;
            document.getElementById('lembrar').checked = true;
        } else {
            document.getElementById('usuario').value = '';
            document.getElementById('senha').value = '';
            document.getElementById('lembrar').checked = false;
        }
        document.getElementById('menuSection').classList.add('hidden'); 
        document.getElementById('loginSection').classList.remove('hidden'); 
    }
    
    function fecharFoto() { fecharModal('photoOverlay'); }
    function voltar() { document.getElementById('planilhaSection').classList.add('hidden'); document.getElementById('menuSection').classList.remove('hidden'); }
    function salvarAgoraManual() { saveD(); mostrarToast("Salvo!"); }
    
    function registrarNovoUsuario() {
        const u = document.getElementById('regUsuario').value.trim(), s = document.getElementById('regSenha').value.trim();
        if(!u || !s) return;
        membros.push({user:u, pass:s, cargo:"Auxiliar", aprovado:false});
        db.ref('membros').set(membros).then(() => { alternarLoginRegistro(false); mostrarToast("Solicitado!"); });
    }

    function renderMembros() { 
        const c = document.getElementById('corpoMembros'); c.innerHTML = "";
        
        const peso = { "Supervisor": 3, "Colaborador": 2, "Auxiliar": 1 };
        
        let listaOrdenada = [...membros].sort((a, b) => {
            if(a.aprovado !== b.aprovado) return a.aprovado ? 1 : -1; 
            return peso[b.cargo] - peso[a.cargo]; 
        });

        listaOrdenada.forEach((m, i) => {
            const realIdx = membros.findIndex(x => x.user === m.user);
            const statusBtn = m.aprovado ? 
                `<button type="button" class="btn-red" style="padding:4px; width:auto; margin:0;" onclick="membros.splice(${realIdx},1); db.ref('membros').set(membros);">REMOVER</button>` : 
                `<button type="button" class="btn-green" style="padding:4px; width:auto; margin:0;" onclick="membros[${realIdx}].aprovado=true; db.ref('membros').set(membros);">APROVAR</button>`;
            
            c.innerHTML += `<tr>
                <td>${m.user}</td>
                <td>${m.pass}</td>
                <td>
                    <select onchange="membros[${realIdx}].cargo=this.value; db.ref('membros').set(membros);">
                        <option value="Supervisor" ${m.cargo==='Supervisor'?'selected':''}>Supervisor</option>
                        <option value="Colaborador" ${m.cargo==='Colaborador'?'selected':''}>Colaborador</option>
                        <option value="Auxiliar" ${m.cargo==='Auxiliar'?'selected':''}>Auxiliar</option>
                    </select>
                </td>
                <td>${statusBtn}</td>
            </tr>`;
        });
    }

    function alternarLoginRegistro(r) { document.getElementById('loginSection').classList.toggle('hidden', r); document.getElementById('registroSection').classList.toggle('hidden', !r); }
    function abrirMembros() { 
        if(cargoUsuario === "Supervisor") {
            document.getElementById('menuSection').classList.add('hidden'); 
            document.getElementById('membrosSection').classList.remove('hidden'); 
            renderMembros(); 
        }
    }
    function voltarAoMenu() { document.getElementById('membrosSection').classList.add('hidden'); document.getElementById('menuSection').classList.remove('hidden'); }
</script>
</body>
</html>
